<!DOCTYPE html>

<html lang="en">
    <head>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
        <link href="styles.css" rel="stylesheet">
        <title>Trivia!</title>
        <script>
            // TODO: Add code to check answers to questions
            document.addEventListener('DOMContentLoaded', function() {

                document.querySelectorAll('.answer').forEach(function(button) {
                    button.addEventListener('click', function() {
                        const feedback = document.getElementById('feedback');
                        if (this.dataset.correct === 'true') {
                            this.style.backgroundColor = 'green';
                            this.style.color = 'white';
                            feedback.textContent = 'Correct!';
                            feedback.style.color = 'green';
                        } else {
                            this.style.backgroundColor = 'red';
                            this.style.color = 'white';
                            feedback.textContent = 'Incorrect';
                            feedback.style.color = 'red';
                        }
                    });
                });

                document.getElementById('check2').addEventListener('click', function() {
                    const input = document.getElementById('answer2');
                    const feedback = document.getElementById('feedback2');
                    const userAnswer = input.value.trim().toLowerCase();

                    if (userAnswer === 'canada') {
                        input.style.backgroundColor = 'green';
                        input.style.color = 'white';
                        feedback.textContent = 'Correct!';
                        feedback.style.color = 'green';
                    } else {
                        input.style.backgroundColor = 'red';
                        input.style.color = 'white';
                        feedback.textContent = 'Incorrect';
                        feedback.style.color = 'red';
                    }
                });

            })
        </script>
    </head>
    <body>
        <div class="header">
            <h1>Trivia!</h1>
        </div>

        <div class="container">
            <div class="section">
                <h2>Part 1: Multiple Choice </h2>
                <hr>
                <!-- TODO: Add multiple choice question here -->
                <h3>What is the chemical symbol for gold?</h3>
                <button class="answer" data-correct="false">Go</button>
                <button class="answer" data-correct="true">Au</button>
                <button class="answer" data-correct="false">Ag</button>
                <button class="answer" data-correct="false">Gd</button>
                <p id="feedback1"></p>
            </div>

            <div class="section">
                <h2>Part 2: Free Response</h2>
                <hr>
                <!-- TODO: Add free response question here -->
                <h3>What country has the most natural lakes in the world?</h3>
                <input id="answer2" type="text" placeholder="Your answer">
                <button id="check2">Check Answer</button>
                <p id="feedback2"></p>
            </div>
        </div>
    </body>
</html>
