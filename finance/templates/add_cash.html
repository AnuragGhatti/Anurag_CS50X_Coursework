{% extends "layout.html" %}
{% block title %}Add Cash{% endblock %}
{% block main %}
    <h4>Add funds to your account</h4>
    <form action="/add_cash" method="post">
        <div class="mb-3">
            <input autofocus class="form-control mx-auto w-auto"
                   name="amount" placeholder="Amount (USD)" type="number" min="0.01" step="0.01">
        </div>
        <button class="btn btn-success" type="submit">Add Cash</button>
    </form>
{% endblock %}
